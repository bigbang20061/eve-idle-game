services:
  mongo:
    image: mongo:8
    container_name: eve_sde_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--wiredTigerCacheSizeGB", "1"]

  app:
    build: .
    container_name: eve_sde_online_game
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_ORIGIN: http://localhost:3000
      MONGODB_URI: mongodb://mongo:27017/eve_sde_online_deep
      SESSION_SECRET: change-this-before-internet
      AUTO_SEED: "true"
      CREATE_DEMO_USERS: "true"
      SDE_STATIC_DIR: /app/sde/yaml
    volumes:
      - ./data:/app/data:ro
      # Clone https://github.com/EVE-China/sde into ./sde.
      # This keeps static game content outside MongoDB and outside this repository.
      - ./sde:/app/sde:ro

volumes:
  mongo_data:
